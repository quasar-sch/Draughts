<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHECKERS</title>
<style>
  :root {
    --bg-deep: #0f0b08;
    --bg-wine: #2a1114;
    --bg-wood: #402819;

    --panel: #ead8b5;
    --ink: #24180f;
    --muted: #6d563d;

    --dark-square: #263f31;
    --light-square: #d7bd8c;
    --board-frame: #372114;

    --black-piece: #14110f;
    --black-piece-edge: #050403;
    --white-piece: #f5e6c7;
    --white-piece-edge: #9a7445;

    --gold: #c7963d;
    --gold-light: #edcf7a;
    --red: #9f1d25;
    --blue: #2563eb;

    --shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
  }

  body.theme-red-white {
    --black-piece: #a51d29;
    --black-piece-edge: #591016;
    --white-piece: #fff0d2;
    --white-piece-edge: #9a7445;
  }

  body.board-brown {
    --dark-square: #6d4426;
    --light-square: #e4c48e;
    --board-frame: #2b1a10;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 12% 10%, rgba(237, 207, 122, 0.22), transparent 25%),
      radial-gradient(circle at 86% 84%, rgba(159, 29, 37, 0.22), transparent 32%),
      linear-gradient(145deg, var(--bg-deep), var(--bg-wine) 48%, var(--bg-wood));
  }

  .app {
    width: 100vw;
    height: 100vh;
    padding: clamp(8px, 1.6vw, 18px);
  }

  .screen {
    display: none;
    width: 100%;
    height: 100%;
  }

  .screen.active {
    display: grid;
  }

  .shell {
    width: min(1120px, 100%);
    height: 100%;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    border: 2px solid rgba(214, 176, 104, 0.45);
    background:
      linear-gradient(180deg, rgba(246, 224, 184, 0.96), rgba(196, 157, 101, 0.96));
    box-shadow: var(--shadow);
    padding: clamp(14px, 2.2vw, 28px);
  }

  .shell::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(63, 37, 20, 0.22);
    pointer-events: none;
  }

  button {
    border: 0;
    border-radius: 8px;
    padding: 13px 20px;
    font-family: inherit;
    font-size: clamp(14px, 1.8vw, 17px);
    font-weight: 950;
    cursor: pointer;
    color: #f8e7c4;
    background: linear-gradient(180deg, #3b2b21, #17100c);
    border: 1px solid rgba(237, 207, 122, 0.5);
    box-shadow: 0 7px 0 #080504, 0 14px 24px rgba(0, 0, 0, 0.24);
    transition: transform 0.12s ease, filter 0.12s ease;
  }

  button:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
  }

  button:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #080504, 0 8px 16px rgba(0, 0, 0, 0.24);
  }

  button.gold {
    color: #21170d;
    background: linear-gradient(180deg, var(--gold-light), #b67924);
    box-shadow: 0 7px 0 #69410f, 0 14px 24px rgba(76, 45, 17, 0.24);
  }

  button.secondary {
    color: #21170d;
    background: linear-gradient(180deg, #ead7ad, #c09861);
    border: 1px solid rgba(70, 43, 23, 0.26);
    box-shadow: 0 6px 0 #7b5a31, 0 12px 20px rgba(80, 45, 18, 0.14);
  }

  button.danger {
    color: #fff3dc;
    background: linear-gradient(180deg, #9f1d25, #4d0c12);
    border: 1px solid rgba(237, 207, 122, 0.35);
    box-shadow: 0 6px 0 #260508, 0 12px 20px rgba(80, 10, 12, 0.22);
  }

  .home-layout,
  .result-layout {
    height: 100%;
    display: grid;
    place-items: center;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .home-content {
    width: min(760px, 100%);
    display: grid;
    gap: clamp(14px, 2.6vh, 24px);
    justify-items: center;
  }

  .home-mark {
    font-size: clamp(50px, 9vw, 108px);
    line-height: 0.9;
    color: #2a1b10;
    text-shadow: 0 2px 0 rgba(255, 255, 255, 0.24);
  }

  h1 {
    margin: 0;
    font-size: clamp(58px, 11vw, 126px);
    line-height: 0.85;
    letter-spacing: -0.09em;
    font-weight: 1000;
    color: #1f140c;
  }

  .toggle-title {
    cursor: pointer;
    user-select: none;
    transition: transform 0.12s ease, letter-spacing 0.12s ease;
  }

  .toggle-title:hover {
    transform: scale(1.015);
  }

  .toggle-title:active {
    transform: scale(0.985);
  }

  .home-sub {
    margin: 0;
    color: var(--muted);
    font-size: clamp(16px, 2.3vw, 24px);
    font-weight: 900;
    line-height: 1.42;
  }

  .lore-card {
    max-width: 640px;
    padding: 10px 14px;
    border: 1px solid rgba(81, 49, 25, 0.25);
    background: rgba(255, 238, 204, 0.52);
    color: #5d422a;
    font-weight: 800;
    line-height: 1.45;
    font-size: clamp(12px, 1.7vw, 16px);
  }

  .menu-buttons {
    width: min(500px, 100%);
    display: grid;
    gap: 12px;
    justify-self: center;
    justify-items: stretch;
  }

  .menu-buttons button {
    width: 100%;
  }

  .start-button,
  .main-button {
    min-height: clamp(58px, 9vh, 78px);
    font-size: clamp(22px, 3vw, 32px);
  }

  .small-buttons {
    width: min(500px, 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .small-buttons button {
    width: 100%;
  }

  .mode-layout {
    height: 100%;
    display: grid;
    align-content: center;
    justify-items: center;
    gap: 18px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .screen-title {
    margin: 0;
    font-size: clamp(38px, 7vw, 76px);
    line-height: 0.95;
    letter-spacing: -0.08em;
    font-weight: 1000;
  }

  .screen-sub {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 850;
  }

  .mode-card {
    width: min(560px, 100%);
    margin: 0 auto;
    display: grid;
    gap: 14px;
    justify-items: stretch;
  }

  .mode-card button {
    width: 100%;
  }

  .info-panel {
    width: min(560px, 100%);
    margin: 0 auto;
    padding: 16px;
    background: rgba(255, 238, 204, 0.58);
    border: 1px solid rgba(81, 49, 25, 0.26);
    border-radius: 10px;
    color: var(--muted);
    font-weight: 850;
    line-height: 1.5;
  }

  .game-layout {
    height: 100%;
    display: grid;
    grid-template-rows: 62px 1fr 54px;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .hud-simple {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: stretch;
    min-height: 0;
  }

  .turn-banner,
  .count-banner {
    display: grid;
    align-content: center;
    padding: 7px 14px;
    border-radius: 9px;
    border: 1px solid rgba(81, 49, 25, 0.32);
    background: rgba(255, 239, 207, 0.82);
    min-height: 0;
  }

  .turn-banner {
    text-align: left;
    background: linear-gradient(180deg, #edcf7a, #b77a25);
    border: 2px solid #654016;
  }

  .turn-label {
    font-size: clamp(12px, 1.5vw, 14px);
    color: #442b13;
    font-weight: 900;
  }

  .turn-value {
    font-size: clamp(23px, 3.7vw, 38px);
    line-height: 1;
    font-weight: 1000;
    letter-spacing: -0.06em;
  }

  .count-banner {
    text-align: right;
    color: #4e3724;
    font-size: clamp(15px, 2.2vw, 26px);
    font-weight: 1000;
    letter-spacing: -0.04em;
    white-space: nowrap;
  }

  .rule-chip {
    font-size: clamp(11px, 1.4vw, 13px);
    font-weight: 900;
    color: #6d563d;
    letter-spacing: 0;
    margin-bottom: 1px;
  }

  .board-wrap {
    min-height: 0;
    min-width: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .board {
    height: 100%;
    max-height: 100%;
    max-width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    background: var(--board-frame);
    border: clamp(8px, 1.4vw, 14px) solid var(--board-frame);
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,0.13),
      0 12px 30px rgba(0,0,0,0.28);
    flex: 0 0 auto;
    transform: translateZ(0);
  }

  .square {
    position: relative;
    display: block;
    min-width: 0;
    min-height: 0;
    user-select: none;
    touch-action: manipulation;
    overflow: hidden;
  }

  .square.light {
    background: var(--light-square);
  }

  .square.dark {
    background: var(--dark-square);
    cursor: pointer;
  }

  .square.valid::after,
  .square.capture-valid::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 34%;
    height: 34%;
    border-radius: 50%;
    z-index: 1;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 5px rgba(255,255,255,0.18);
    pointer-events: none;
  }

  .square.valid::after {
    background: rgba(37, 99, 235, 0.78);
  }

  .square.capture-valid::after {
    background: rgba(185, 28, 28, 0.86);
  }

  .square.selected {
    box-shadow: inset 0 0 0 5px #facc15;
  }

  .piece {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 76%;
    height: 76%;
    border-radius: 50%;
    z-index: 2;
    display: grid;
    place-items: center;
    cursor: pointer;
    transform: translate(-50%, -50%);
    box-shadow:
      inset 0 6px 8px rgba(255,255,255,0.20),
      inset 0 -9px 12px rgba(0,0,0,0.28),
      0 5px 8px rgba(0,0,0,0.30);
    pointer-events: none;
  }

  .piece.black {
    background: var(--black-piece);
    border: 4px solid var(--black-piece-edge);
    color: #f8e3b0;
  }

  .piece.white {
    background: var(--white-piece);
    border: 4px solid var(--white-piece-edge);
    color: #3a2818;
  }

  .piece.king::before {
    content: "★";
    font-size: clamp(18px, 2.7vw, 32px);
    font-weight: 1000;
    text-shadow: 0 2px 3px rgba(0,0,0,0.28);
  }

  .bottom-bar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: stretch;
    min-height: 0;
  }

  .message {
    height: 54px;
    display: grid;
    align-content: center;
    background: rgba(255, 239, 207, 0.86);
    border: 1px solid rgba(81, 49, 25, 0.32);
    border-radius: 9px;
    padding: 7px 12px;
    color: var(--muted);
    font-weight: 900;
    font-size: clamp(12px, 1.6vw, 15px);
    line-height: 1.3;
    overflow: hidden;
  }

  .bottom-actions {
    height: 54px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .bottom-actions button {
    height: 54px;
    padding: 8px 12px;
    font-size: clamp(12px, 1.5vw, 14px);
    white-space: nowrap;
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(15, 11, 8, 0.76);
  }

  .modal.active {
    display: flex;
  }

  .modal-box {
    width: min(760px, 100%);
    max-height: 84vh;
    overflow: auto;
    background: #ead8b5;
    border: 2px solid #5b351d;
    border-radius: 12px;
    padding: 22px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .modal-box h2 {
    margin: 0 0 12px;
    font-size: clamp(30px, 5vw, 52px);
    line-height: 1;
    letter-spacing: -0.07em;
  }

  .rule-list {
    margin: 14px 0 20px;
    padding: 0;
    display: grid;
    gap: 8px;
    text-align: left;
    list-style: none;
  }

  .rule-list li {
    padding: 10px 12px;
    background: rgba(255, 241, 210, 0.72);
    border: 1px solid rgba(81, 49, 25, 0.22);
    border-radius: 8px;
    color: #5d422a;
    font-weight: 760;
    line-height: 1.45;
  }

  .option-grid {
    display: grid;
    gap: 14px;
    text-align: left;
    margin: 16px 0 18px;
  }

  .option-row {
    background: rgba(255, 241, 210, 0.72);
    border: 1px solid rgba(81, 49, 25, 0.22);
    border-radius: 8px;
    padding: 14px;
  }

  .option-row h3 {
    margin: 0 0 10px;
    font-size: 18px;
  }

  .option-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .option-buttons button {
    padding: 9px 12px;
    font-size: 14px;
    box-shadow: none;
  }

  .option-buttons button.active-option {
    color: #21170d;
    background: linear-gradient(180deg, var(--gold-light), #b67924);
    border-color: #6d4315;
  }

  .rule-choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .rule-choice-card {
    width: 100%;
    min-height: 124px;
    padding: 12px 14px;
    border-radius: 8px;
    text-align: left;
    display: grid;
    align-content: start;
    gap: 6px;
    box-shadow: none;
  }

  .rule-choice-card strong {
    display: block;
    font-size: 18px;
    font-weight: 1000;
    letter-spacing: -0.04em;
  }

  .rule-choice-card span {
    display: block;
    color: #5d422a;
    font-size: 13px;
    font-weight: 800;
    line-height: 1.38;
  }

  .rule-choice-card.active-option {
    color: #21170d;
    background: linear-gradient(180deg, var(--gold-light), #b67924);
    border-color: #6d4315;
  }

  .rule-choice-card.active-option span {
    color: #3f2a17;
  }

  .rule-note {
    margin: 10px 0 0;
    color: #6d563d;
    font-size: 13px;
    font-weight: 800;
    line-height: 1.45;
  }

  .result-title {
    margin: 0;
    font-size: clamp(48px, 8vw, 88px);
    line-height: 0.92;
    letter-spacing: -0.08em;
    font-weight: 1000;
  }

  .result-text {
    margin: 0;
    color: var(--muted);
    font-weight: 900;
    font-size: clamp(17px, 2.4vw, 24px);
  }

  .shake {
    animation: shake 0.24s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  @media (max-width: 820px) {
    .app {
      padding: 7px;
    }

    .shell {
      padding: 10px;
      border-radius: 9px;
    }

    .game-layout {
      grid-template-rows: 88px 1fr 92px;
    }

    .hud-simple {
      grid-template-columns: 1fr;
      gap: 5px;
    }

    .turn-banner,
    .count-banner {
      padding: 5px 10px;
      text-align: center;
    }

    .bottom-bar {
      grid-template-columns: 1fr;
      gap: 5px;
    }

    .bottom-actions {
      order: 2;
      height: 42px;
    }

    .bottom-actions button {
      height: 42px;
      padding: 6px 10px;
    }

    .message {
      height: 45px;
      padding: 5px 9px;
    }

    .piece {
      border-width: 3px;
    }
  }

  @media (max-width: 620px) {
    .rule-choice-grid {
      grid-template-columns: 1fr;
    }

    .rule-choice-card {
      min-height: auto;
    }
  }

  @media (max-height: 650px) {
    .home-mark {
      display: none;
    }

    h1 {
      font-size: clamp(48px, 9vw, 82px);
    }

    .home-sub {
      font-size: 15px;
    }

    .lore-card {
      display: none;
    }

    .game-layout {
      grid-template-rows: 52px 1fr 48px;
    }

    .message,
    .bottom-actions,
    .bottom-actions button {
      height: 48px;
    }
  }
</style>
</head>
<body>
<div class="app">

  <section id="homeScreen" class="screen active">
    <div class="shell home-layout">
      <div class="home-content">
        <div class="home-mark">⛂ ⛀</div>
        <h1 id="mainTitle" class="toggle-title" onclick="toggleGameTitle()">CHECKERS</h1>
        <p id="homeSubTitle" class="home-sub">오래된 수읽기의 게임, 체커</p>
        <div id="loreText" class="lore-card"></div>

        <div class="menu-buttons">
          <button class="gold start-button" onclick="showScreen('modeScreen')">게임 시작</button>
        </div>

        <div class="small-buttons">
          <button class="secondary" onclick="openOptions()">옵션</button>
          <button class="secondary" onclick="openRules()">규칙</button>
        </div>
      </div>
    </div>
  </section>

  <section id="modeScreen" class="screen">
    <div class="shell mode-layout">
      <div>
        <h2 class="screen-title">게임 선택</h2>
        <p id="modeRuleText" class="screen-sub">영미식 체커 8×8 규칙으로 진행합니다</p>
      </div>

      <div class="menu-buttons">
        <button class="main-button" onclick="showScreen('computerScreen')">VS 컴퓨터</button>
        <button class="main-button" onclick="startMultiGame()">멀티플레이</button>
        <button class="secondary main-button" onclick="goHome()">메인으로</button>
      </div>
    </div>
  </section>

  <section id="computerScreen" class="screen">
    <div class="shell mode-layout">
      <div>
        <h2 class="screen-title">VS 컴퓨터</h2>
        <p id="computerStartText" class="screen-sub">플레이어: 흑 · 컴퓨터: 백</p>
      </div>

      <div class="mode-card">
        <div class="info-panel" id="computerInfo"></div>
        <button class="gold main-button" onclick="startComputerGame()">시작</button>
        <button class="secondary main-button" onclick="showScreen('modeScreen')">뒤로</button>
      </div>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="shell game-layout">
      <div class="hud-simple">
        <div class="turn-banner">
          <div id="ruleDisplay" class="rule-chip">영미식</div>
          <div class="turn-label">차례</div>
          <div id="turnDisplay" class="turn-value">흑</div>
        </div>
        <div id="countDisplay" class="count-banner">흑 12 · 백 12</div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board" aria-label="체커 보드"></div>
      </div>

      <div class="bottom-bar">
        <div id="message" class="message">흑 차례입니다.</div>
        <div class="bottom-actions">
          <button class="gold" onclick="restartGame()">재시작</button>
          <button class="secondary" onclick="openRules()">규칙</button>
          <button class="danger" onclick="goHome()">메인으로</button>
        </div>
      </div>
    </div>
  </section>

  <section id="resultScreen" class="screen">
    <div class="shell result-layout">
      <div class="home-content">
        <h2 id="resultTitle" class="result-title">승리!</h2>
        <p id="resultText" class="result-text"></p>
        <button class="gold start-button" onclick="restartGame()">같은 설정으로 재시작</button>
        <button class="secondary" onclick="goHome()">메인으로</button>
      </div>
    </div>
  </section>

</div>

<div id="rulesModal" class="modal" onclick="closeModal(event, 'rulesModal')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2 id="rulesTitle">체커 규칙</h2>
    <ul id="rulesList" class="rule-list"></ul>
    <button onclick="closeModal(null, 'rulesModal')">닫기</button>
  </div>
</div>

<div id="optionsModal" class="modal" onclick="closeModal(event, 'optionsModal')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>옵션</h2>

    <div class="option-grid">
      <div class="option-row">
        <h3>규칙</h3>

        <div class="rule-choice-grid">
          <button id="optRuleEnglish" class="rule-choice-card" onclick="setRuleset('english')">
            <strong>영미식 8×8</strong>
            <span>흑 선공 · 12개씩 배치</span>
            <span>일반 말은 앞 방향 포획</span>
            <span>King은 앞뒤 대각선 1칸 이동</span>
          </button>

          <button id="optRuleInternational" class="rule-choice-card" onclick="setRuleset('international')">
            <strong>국제식 10×10</strong>
            <span>백 선공 · 20개씩 배치</span>
            <span>일반 말도 앞뒤 포획 가능</span>
            <span>King은 대각선 장거리 이동</span>
          </button>
        </div>

        <p class="rule-note">
          국제식은 여러 포획 경로가 있을 때 가장 많은 말을 잡는 경로를 선택해야 합니다.
        </p>
      </div>

      <div class="option-row">
        <h3>VS 컴퓨터 플레이어 색</h3>
        <div class="option-buttons">
          <button id="optPlayerBlack" onclick="setPlayerSide('B')">흑</button>
          <button id="optPlayerWhite" onclick="setPlayerSide('W')">백</button>
        </div>
      </div>

      <div class="option-row">
        <h3>말 색 테마</h3>
        <div class="option-buttons">
          <button id="optThemeBlackWhite" onclick="setPieceTheme('black-white')">흑백</button>
          <button id="optThemeRedWhite" onclick="setPieceTheme('red-white')">적백</button>
        </div>
      </div>

      <div class="option-row">
        <h3>보드 테마</h3>
        <div class="option-buttons">
          <button id="optBoardGreen" onclick="setBoardTheme('green')">녹색</button>
          <button id="optBoardBrown" onclick="setBoardTheme('brown')">갈색</button>
        </div>
      </div>
    </div>

    <button onclick="closeModal(null, 'optionsModal')">닫기</button>
  </div>
</div>

<script>
  const BLACK = "B";
  const WHITE = "W";

  const RULESETS = {
    english: {
      id: "english",
      name: "영미식",
      boardSize: 8,
      setupRows: 3,
      firstTurn: BLACK,
      menCaptureBackward: false,
      flyingKings: false,
      maxCaptureRequired: false,
      crownStopsCapture: true
    },
    international: {
      id: "international",
      name: "국제식",
      boardSize: 10,
      setupRows: 4,
      firstTurn: WHITE,
      menCaptureBackward: true,
      flyingKings: true,
      maxCaptureRequired: true,
      crownStopsCapture: false
    }
  };

  const loreLines = [
    "체커는 가장 오래된 추상 전략 보드게임 중 하나로 여겨집니다.",
    "단순한 말, 깊은 수읽기. 체커의 승부는 강제 포획에서 갈립니다.",
    "고대 이집트에서도 체커와 닮은 게임판이 발견된 것으로 알려져 있습니다.",
    "서구권에서는 체스와 함께 오랫동안 사랑받아 온 대표적인 보드게임입니다.",
    "체커는 수비만으로 이기기 어렵습니다. 중앙을 차지하고 수를 강요해야 합니다."
  ];

  const options = {
    ruleset: "english",
    playerSide: BLACK,
    pieceTheme: "black-white",
    boardTheme: "green"
  };

  const state = {
    mode: "multi",
    humanSide: null,
    aiSide: null,
    board: [],
    turn: BLACK,
    selected: null,
    validMoves: [],
    forcedPiece: null,
    gameOver: false,
    noProgressTurns: 0
  };

  let lastConfig = null;
  let aiTimer = null;
  let messageTimer = null;

  initPage();

  function initPage() {
    document.getElementById("loreText").textContent =
      loreLines[Math.floor(Math.random() * loreLines.length)];

    updateOptionsUI();
    updateRulesText();
  }

  function toggleGameTitle() {
    const title = document.getElementById("mainTitle");
    const subTitle = document.getElementById("homeSubTitle");
    const isCheckers = title.textContent === "CHECKERS";

    title.textContent = isCheckers ? "DRAUGHTS" : "CHECKERS";
    subTitle.textContent = isCheckers
      ? "오래된 수읽기의 게임, 드래프츠"
      : "오래된 수읽기의 게임, 체커";
  }

  function currentRules() {
    return RULESETS[options.ruleset];
  }

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(screen => {
      screen.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    updateComputerText();
    updateModeText();
  }

  function goHome() {
    clearTimeout(aiTimer);
    clearTimeout(messageTimer);
    showScreen("homeScreen");
  }

  function openRules() {
    updateRulesText();
    document.getElementById("rulesModal").classList.add("active");
  }

  function openOptions() {
    updateOptionsUI();
    document.getElementById("optionsModal").classList.add("active");
  }

  function closeModal(event, id) {
    if (event && event.target.id !== id) return;
    document.getElementById(id).classList.remove("active");
  }

  function updateOptionsUI() {
    document.body.classList.toggle("theme-red-white", options.pieceTheme === "red-white");
    document.body.classList.toggle("board-brown", options.boardTheme === "brown");

    setActive("optRuleEnglish", options.ruleset === "english");
    setActive("optRuleInternational", options.ruleset === "international");
    setActive("optPlayerBlack", options.playerSide === BLACK);
    setActive("optPlayerWhite", options.playerSide === WHITE);
    setActive("optThemeBlackWhite", options.pieceTheme === "black-white");
    setActive("optThemeRedWhite", options.pieceTheme === "red-white");
    setActive("optBoardGreen", options.boardTheme === "green");
    setActive("optBoardBrown", options.boardTheme === "brown");

    updateComputerText();
    updateModeText();

    if (document.getElementById("gameScreen").classList.contains("active")) {
      render();
    }
  }

  function setActive(id, active) {
    const el = document.getElementById(id);
    if (!el) return;

    el.classList.toggle("active-option", active);
    el.classList.toggle("secondary", !active);
  }

  function setRuleset(ruleset) {
    options.ruleset = ruleset;
    updateOptionsUI();
  }

  function setPlayerSide(side) {
    options.playerSide = side;
    updateOptionsUI();
  }

  function setPieceTheme(theme) {
    options.pieceTheme = theme;
    updateOptionsUI();
  }

  function setBoardTheme(theme) {
    options.boardTheme = theme;
    updateOptionsUI();
  }

  function updateModeText() {
    const el = document.getElementById("modeRuleText");
    if (!el) return;

    const rule = currentRules();
    el.textContent = `${rule.name} 체커 ${rule.boardSize}×${rule.boardSize} 규칙으로 진행합니다`;
  }

  function updateComputerText() {
    const text = document.getElementById("computerStartText");
    const info = document.getElementById("computerInfo");
    if (!text || !info) return;

    const rule = currentRules();
    const player = sideName(options.playerSide);
    const computer = sideName(opponent(options.playerSide));
    const first = sideName(rule.firstTurn);

    text.textContent = `플레이어: ${player} · 컴퓨터: ${computer}`;
    info.textContent =
      `${rule.name} 규칙입니다. ${first}이 먼저 시작합니다. ` +
      (options.playerSide === rule.firstTurn ? "플레이어가 선공입니다." : "컴퓨터가 선공입니다.");
  }

  function updateRulesText() {
    const rule = currentRules();
    document.getElementById("rulesTitle").textContent = `${rule.name} 체커 규칙`;

    const englishRules = [
      "8×8 보드에서 진행하며, 말은 어두운 칸에서만 움직입니다.",
      "흑 12개, 백 12개로 시작하며 흑이 먼저 둡니다.",
      "일반 말은 대각선 앞 방향으로 한 칸 이동합니다.",
      "상대 말을 뛰어넘을 수 있으면 반드시 잡아야 합니다.",
      "일반 말은 앞 방향으로만 포획할 수 있습니다.",
      "한 번 잡은 뒤 같은 말로 또 잡을 수 있으면 계속 잡아야 합니다.",
      "여러 포획 경로가 있으면 플레이어가 원하는 경로를 선택할 수 있습니다.",
      "마지막 행에 도착하면 King이 되며, 그 차례는 끝납니다.",
      "King은 앞뒤 대각선으로 한 칸 이동하거나 포획할 수 있습니다.",
      "상대 말을 모두 잡거나, 상대가 움직일 수 없게 만들면 승리합니다."
    ];

    const internationalRules = [
      "10×10 보드에서 진행하며, 말은 어두운 칸에서만 움직입니다.",
      "흑 20개, 백 20개로 시작하며 백이 먼저 둡니다.",
      "일반 말은 대각선 앞 방향으로 한 칸 이동합니다.",
      "일반 말은 앞뒤 대각선 방향으로 상대 말을 포획할 수 있습니다.",
      "상대 말을 잡을 수 있으면 반드시 잡아야 합니다.",
      "여러 포획 경로가 있다면 가장 많은 말을 잡는 경로를 선택해야 합니다.",
      "King은 대각선 방향으로 원하는 만큼 이동할 수 있습니다.",
      "King은 대각선상에 있는 상대 말을 뛰어넘어 포획할 수 있습니다.",
      "마지막 행에 도착하면 King이 됩니다.",
      "상대 말을 모두 잡거나, 상대가 움직일 수 없게 만들면 승리합니다."
    ];

    const list = document.getElementById("rulesList");
    list.innerHTML = "";

    const data = rule.id === "english" ? englishRules : internationalRules;

    data.forEach(text => {
      const li = document.createElement("li");
      li.textContent = text;
      list.appendChild(li);
    });
  }

  function startMultiGame() {
    startGame({
      mode: "multi",
      humanSide: null,
      aiSide: null,
      ruleset: options.ruleset
    });
  }

  function startComputerGame() {
    startGame({
      mode: "computer",
      humanSide: options.playerSide,
      aiSide: opponent(options.playerSide),
      ruleset: options.ruleset
    });
  }

  function startGame(config) {
    clearTimeout(aiTimer);
    clearTimeout(messageTimer);

    lastConfig = { ...config };

    options.ruleset = config.ruleset;

    state.mode = config.mode;
    state.humanSide = config.humanSide;
    state.aiSide = config.aiSide;
    state.board = createInitialBoard();
    state.turn = currentRules().firstTurn;
    state.selected = null;
    state.validMoves = [];
    state.forcedPiece = null;
    state.gameOver = false;
    state.noProgressTurns = 0;

    showScreen("gameScreen");
    render();
    maybeAiTurn();
  }

  function restartGame() {
    if (!lastConfig) {
      startMultiGame();
      return;
    }

    startGame(lastConfig);
  }

  function createInitialBoard() {
    const rule = currentRules();
    const size = rule.boardSize;
    const board = Array.from({ length: size }, () => Array(size).fill(null));

    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (!isDarkSquare(r, c)) continue;

        if (r < rule.setupRows) {
          board[r][c] = { side: BLACK, king: false };
        } else if (r >= size - rule.setupRows) {
          board[r][c] = { side: WHITE, king: false };
        }
      }
    }

    return board;
  }

  function shouldFlipBoard() {
    return state.mode === "computer" && state.humanSide === BLACK;
  }

  function displayToBoard(dr, dc) {
    const size = currentRules().boardSize;

    if (!shouldFlipBoard()) {
      return { r: dr, c: dc };
    }

    return {
      r: size - 1 - dr,
      c: size - 1 - dc
    };
  }

  function render() {
    if (!document.getElementById("gameScreen").classList.contains("active")) return;

    renderHud();
    renderBoard();
    renderMessage();
  }

  function renderHud() {
    const rule = currentRules();
    document.getElementById("ruleDisplay").textContent = rule.name;
    document.getElementById("turnDisplay").textContent = `${sideName(state.turn)} 차례`;
    document.getElementById("countDisplay").textContent =
      `흑 ${countPieces(BLACK)} · 백 ${countPieces(WHITE)}`;
  }

  function renderMessage() {
    if (state.gameOver) return;

    const rule = currentRules();

    if (isAiTurn()) {
      setMainMessage("컴퓨터가 생각 중입니다.");
      return;
    }

    if (state.forcedPiece) {
      setMainMessage("연속으로 잡을 수 있습니다. 같은 말로 계속 포획하세요.");
      return;
    }

    const captures = getAllLegalMoves(state.turn).filter(move => move.capture);

    if (captures.length > 0) {
      const extra = rule.maxCaptureRequired ? " 가능한 한 가장 많이 잡는 경로를 선택해야 합니다." : "";
      setMainMessage(`${sideName(state.turn)} 차례입니다. 잡을 수 있는 말이 있습니다. 반드시 포획해야 합니다.${extra}`);
    } else {
      setMainMessage(`${sideName(state.turn)} 차례입니다. 움직일 말을 선택하세요.`);
    }
  }

  function setMainMessage(text) {
    document.getElementById("message").textContent = text;
  }

  function flashMessage(text) {
    clearTimeout(messageTimer);
    setMainMessage(text);
    messageTimer = setTimeout(() => {
      renderMessage();
    }, 1300);
  }

  function renderBoard() {
    const rule = currentRules();
    const size = rule.boardSize;
    const boardEl = document.getElementById("board");

    boardEl.innerHTML = "";
    boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    boardEl.style.gridTemplateRows = `repeat(${size}, 1fr)`;

    for (let dr = 0; dr < size; dr++) {
      for (let dc = 0; dc < size; dc++) {
        const { r, c } = displayToBoard(dr, dc);

        const square = document.createElement("div");
        square.className = `square ${isDarkSquare(r, c) ? "dark" : "light"}`;
        square.onclick = () => onSquareClick(r, c);

        const move = state.validMoves.find(m => m.to.r === r && m.to.c === c);
        if (move) {
          square.classList.add(move.capture ? "capture-valid" : "valid");
        }

        if (state.selected && state.selected.r === r && state.selected.c === c) {
          square.classList.add("selected");
        }

        const piece = state.board[r][c];

        if (piece) {
          const pieceEl = document.createElement("div");
          pieceEl.className = `piece ${piece.side === BLACK ? "black" : "white"} ${piece.king ? "king" : ""}`;
          square.appendChild(pieceEl);
        }

        boardEl.appendChild(square);
      }
    }
  }

  function onSquareClick(r, c) {
    if (state.gameOver || isAiTurn()) return;
    if (!isDarkSquare(r, c)) return;

    if (state.forcedPiece) {
      handleForcedCaptureClick(r, c);
      return;
    }

    if (!state.selected) {
      selectPiece(r, c);
      return;
    }

    const move = state.validMoves.find(m => m.to.r === r && m.to.c === c);

    if (move) {
      applyHumanMove(move);
      return;
    }

    const piece = state.board[r][c];

    if (piece && piece.side === state.turn) {
      selectPiece(r, c);
      return;
    }

    clearSelection();
    render();
  }

  function selectPiece(r, c) {
    const piece = state.board[r][c];

    if (!piece || piece.side !== state.turn) {
      shakeBoard();
      return;
    }

    const allMoves = getAllLegalMoves(state.turn);
    const captures = allMoves.filter(move => move.capture);
    const pieceMoves = allMoves.filter(move => move.from.r === r && move.from.c === c);

    if (captures.length > 0 && !pieceMoves.some(move => move.capture)) {
      shakeBoard();
      flashMessage("잡을 수 있는 말이 있습니다. 체커에서는 반드시 포획해야 합니다.");
      return;
    }

    if (pieceMoves.length === 0) {
      shakeBoard();
      return;
    }

    state.selected = { r, c };
    state.validMoves = pieceMoves;
    render();
  }

  function handleForcedCaptureClick(r, c) {
    const move = state.validMoves.find(m => m.to.r === r && m.to.c === c);

    if (move) {
      applyHumanMove(move);
      return;
    }

    shakeBoard();
    flashMessage("연속 포획이 가능합니다. 같은 말로 계속 잡아야 합니다.");
  }

  function applyHumanMove(move) {
    const result = applyMoveToBoard(state.board, move);

    if (result.mustContinue) {
      state.selected = { ...move.to };
      state.forcedPiece = { ...move.to };
      state.validMoves = getForcedCaptureMoves(move.to.r, move.to.c);
      render();
      return;
    }

    endTurn(result.progress);
  }

  function applyMoveToBoard(board, move) {
    const rule = currentRules();
    const piece = board[move.from.r][move.from.c];
    let captured = false;
    let becameKing = false;

    board[move.from.r][move.from.c] = null;
    board[move.to.r][move.to.c] = piece;

    if (move.capture) {
      board[move.capture.r][move.capture.c] = null;
      captured = true;
    }

    const reachesRow = !piece.king && reachesKingRow(piece.side, move.to.r);

    if (reachesRow && (!captured || rule.crownStopsCapture)) {
      piece.king = true;
      becameKing = true;
    }

    let mustContinue = false;

    if (captured && !(becameKing && rule.crownStopsCapture)) {
      mustContinue = getForcedCaptureMoves(move.to.r, move.to.c, board).length > 0;

      if (!mustContinue && reachesRow && !piece.king) {
        piece.king = true;
        becameKing = true;
      }
    }

    return {
      captured,
      becameKing,
      mustContinue,
      progress: captured || becameKing
    };
  }

  function endTurn(progress) {
    clearSelection();
    state.forcedPiece = null;

    state.noProgressTurns = progress ? 0 : state.noProgressTurns + 1;

    const enemy = opponent(state.turn);

    if (countPieces(enemy) === 0) {
      finishGame(state.turn, `${sideName(enemy)} 말이 모두 잡혔습니다.`);
      return;
    }

    state.turn = enemy;

    if (getAllLegalMoves(state.turn).length === 0) {
      finishGame(opponent(state.turn), `${sideName(state.turn)}이 더 이상 움직일 수 없습니다.`);
      return;
    }

    if (state.noProgressTurns >= 80) {
      finishDraw("오랫동안 포획이나 승급이 없어 무승부로 처리합니다.");
      return;
    }

    render();
    maybeAiTurn();
  }

  function clearSelection() {
    state.selected = null;
    state.validMoves = [];
  }

  function finishGame(winner, reason) {
    state.gameOver = true;
    render();

    document.getElementById("resultTitle").textContent = `${sideName(winner)} 승리!`;
    document.getElementById("resultText").textContent = reason;

    setTimeout(() => showScreen("resultScreen"), 520);
  }

  function finishDraw(reason) {
    state.gameOver = true;
    render();

    document.getElementById("resultTitle").textContent = "무승부";
    document.getElementById("resultText").textContent = reason;

    setTimeout(() => showScreen("resultScreen"), 520);
  }

  function getAllLegalMoves(side, board = state.board) {
    const captures = [];
    const normals = [];

    forEachPiece(board, side, (r, c) => {
      captures.push(...getCaptureMovesFrom(r, c, board));
      normals.push(...getNormalMovesFrom(r, c, board));
    });

    if (captures.length > 0) {
      return filterMaxCapturesIfNeeded(captures, board);
    }

    return normals;
  }

  function getForcedCaptureMoves(r, c, board = state.board) {
    const captures = getCaptureMovesFrom(r, c, board);
    return filterMaxCapturesIfNeeded(captures, board);
  }

  function filterMaxCapturesIfNeeded(moves, board) {
    const rule = currentRules();

    if (!rule.maxCaptureRequired || moves.length <= 1) {
      return moves;
    }

    const scored = moves.map(move => ({
      move,
      count: captureCountForMove(move, board)
    }));

    const max = Math.max(...scored.map(item => item.count));
    return scored.filter(item => item.count === max).map(item => item.move);
  }

  function captureCountForMove(move, board) {
    const clone = cloneBoard(board);
    const result = applyMoveToBoard(clone, cloneMove(move));

    if (!result.mustContinue) {
      return 1;
    }

    return 1 + maxCaptureChainFrom(move.to.r, move.to.c, clone);
  }

  function maxCaptureChainFrom(r, c, board) {
    const captures = getCaptureMovesFrom(r, c, board);

    if (captures.length === 0) {
      return 0;
    }

    let max = 0;

    captures.forEach(move => {
      const clone = cloneBoard(board);
      const result = applyMoveToBoard(clone, cloneMove(move));
      const count = result.mustContinue ? 1 + maxCaptureChainFrom(move.to.r, move.to.c, clone) : 1;
      max = Math.max(max, count);
    });

    return max;
  }

  function getNormalMovesFrom(r, c, board = state.board) {
    const piece = board[r][c];
    if (!piece) return [];

    if (piece.king && currentRules().flyingKings) {
      return getFlyingKingNormalMoves(r, c, board);
    }

    const moves = [];

    getMoveDirs(piece).forEach(([dr, dc]) => {
      const nr = r + dr;
      const nc = c + dc;

      if (!inBoard(nr, nc) || board[nr][nc]) return;

      moves.push({
        from: { r, c },
        to: { r: nr, c: nc },
        capture: null
      });
    });

    return moves;
  }

  function getFlyingKingNormalMoves(r, c, board) {
    const moves = [];

    for (const [dr, dc] of allDiagonalDirs()) {
      let nr = r + dr;
      let nc = c + dc;

      while (inBoard(nr, nc) && !board[nr][nc]) {
        moves.push({
          from: { r, c },
          to: { r: nr, c: nc },
          capture: null
        });

        nr += dr;
        nc += dc;
      }
    }

    return moves;
  }

  function getCaptureMovesFrom(r, c, board = state.board) {
    const piece = board[r][c];
    if (!piece) return [];

    if (piece.king && currentRules().flyingKings) {
      return getFlyingKingCaptureMoves(r, c, board);
    }

    const moves = [];

    getCaptureDirs(piece).forEach(([dr, dc]) => {
      const mr = r + dr;
      const mc = c + dc;
      const lr = r + dr * 2;
      const lc = c + dc * 2;

      if (!inBoard(mr, mc) || !inBoard(lr, lc)) return;

      const middle = board[mr][mc];
      const landing = board[lr][lc];

      if (!middle || middle.side === piece.side || landing) return;

      moves.push({
        from: { r, c },
        to: { r: lr, c: lc },
        capture: { r: mr, c: mc }
      });
    });

    return moves;
  }

  function getFlyingKingCaptureMoves(r, c, board) {
    const piece = board[r][c];
    const moves = [];

    for (const [dr, dc] of allDiagonalDirs()) {
      let nr = r + dr;
      let nc = c + dc;
      let captured = null;

      while (inBoard(nr, nc)) {
        const target = board[nr][nc];

        if (!target) {
          if (captured) {
            moves.push({
              from: { r, c },
              to: { r: nr, c: nc },
              capture: { ...captured }
            });
          }
        } else {
          if (target.side === piece.side) {
            break;
          }

          if (captured) {
            break;
          }

          captured = { r: nr, c: nc };
        }

        nr += dr;
        nc += dc;
      }
    }

    return moves;
  }

  function getMoveDirs(piece) {
    if (piece.king) {
      return allDiagonalDirs();
    }

    return piece.side === BLACK
      ? [[1, -1], [1, 1]]
      : [[-1, -1], [-1, 1]];
  }

  function getCaptureDirs(piece) {
    const rule = currentRules();

    if (piece.king || rule.menCaptureBackward) {
      return allDiagonalDirs();
    }

    return piece.side === BLACK
      ? [[1, -1], [1, 1]]
      : [[-1, -1], [-1, 1]];
  }

  function allDiagonalDirs() {
    return [[1, -1], [1, 1], [-1, -1], [-1, 1]];
  }

  function maybeAiTurn() {
    if (!isAiTurn() || state.gameOver) return;

    aiTimer = setTimeout(() => {
      runAiTurn();
    }, 620);
  }

  function runAiTurn() {
    if (!isAiTurn() || state.gameOver) return;

    const move = chooseAiMove();

    if (!move) {
      finishGame(opponent(state.turn), `${sideName(state.turn)}이 더 이상 움직일 수 없습니다.`);
      return;
    }

    state.selected = { ...move.from };
    state.validMoves = [move];
    render();

    aiTimer = setTimeout(() => {
      const result = applyMoveToBoard(state.board, move);

      if (result.mustContinue) {
        state.selected = { ...move.to };
        state.forcedPiece = { ...move.to };
        state.validMoves = getForcedCaptureMoves(move.to.r, move.to.c);
        render();

        aiTimer = setTimeout(() => {
          runAiTurn();
        }, 520);

        return;
      }

      endTurn(result.progress);
    }, 520);
  }

  function chooseAiMove() {
    const moves = state.forcedPiece
      ? getForcedCaptureMoves(state.forcedPiece.r, state.forcedPiece.c)
      : getAllLegalMoves(state.turn);

    if (!moves.length) return null;

    const scored = moves
      .map(move => ({ move, score: scoreAiMove(move) }))
      .sort((a, b) => b.score - a.score);

    if (Math.random() < 0.8) {
      return scored[0].move;
    }

    const range = Math.min(3, scored.length);
    return scored[randomInt(0, range - 1)].move;
  }

  function scoreAiMove(move) {
    const piece = state.board[move.from.r][move.from.c];
    const snapshot = cloneBoard(state.board);

    applyMoveToBoard(snapshot, cloneMove(move));

    const movedPiece = snapshot[move.to.r][move.to.c];
    const oldBoard = state.board;
    state.board = snapshot;

    const captureBonus = move.capture ? 130 : 0;
    const maxCaptureBonus = currentRules().maxCaptureRequired ? captureCountForMove(move, oldBoard) * 35 : 0;
    const kingBonus = movedPiece && movedPiece.king && !piece.king ? 95 : 0;
    const center = centerScore(move.to.r, move.to.c) * 8;
    const advance = advancementScore(piece.side, move.to.r) * 3.5;
    const safety = isImmediatelyCapturable(move.to.r, move.to.c, piece.side) ? -95 : 0;
    const support = friendlySupport(move.to.r, move.to.c, piece.side) * 12;
    const ownMobility = getAllLegalMoves(piece.side).length * 1.1;
    const enemyMobility = getAllLegalMoves(opponent(piece.side)).length * -0.9;

    state.board = oldBoard;

    return captureBonus + maxCaptureBonus + kingBonus + center + advance + safety + support + ownMobility + enemyMobility + Math.random() * 2;
  }

  function cloneBoard(board) {
    return board.map(row => row.map(piece => piece ? { ...piece } : null));
  }

  function cloneMove(move) {
    return {
      from: { ...move.from },
      to: { ...move.to },
      capture: move.capture ? { ...move.capture } : null
    };
  }

  function isImmediatelyCapturable(r, c, side) {
    const enemy = opponent(side);
    const board = state.board;

    for (const [dr, dc] of allDiagonalDirs()) {
      const er = r - dr;
      const ec = c - dc;
      const lr = r + dr;
      const lc = c + dc;

      if (!inBoard(er, ec) || !inBoard(lr, lc)) continue;

      const enemyPiece = board[er][ec];
      const landing = board[lr][lc];

      if (!enemyPiece || enemyPiece.side !== enemy || landing) continue;

      const canCapture =
        enemyPiece.king ||
        currentRules().menCaptureBackward ||
        enemyPiece.side === BLACK && dr === 1 ||
        enemyPiece.side === WHITE && dr === -1;

      if (canCapture) return true;
    }

    return false;
  }

  function friendlySupport(r, c, side) {
    let count = 0;

    allDiagonalDirs().forEach(([dr, dc]) => {
      const nr = r + dr;
      const nc = c + dc;

      if (!inBoard(nr, nc)) return;

      const piece = state.board[nr][nc];
      if (piece && piece.side === side) count++;
    });

    return count;
  }

  function centerScore(r, c) {
    const size = currentRules().boardSize;
    const center = (size - 1) / 2;
    const dist = Math.abs(r - center) + Math.abs(c - center);
    return size - dist;
  }

  function advancementScore(side, r) {
    const size = currentRules().boardSize;
    return side === BLACK ? r : size - 1 - r;
  }

  function reachesKingRow(side, r) {
    const size = currentRules().boardSize;
    return side === BLACK ? r === size - 1 : r === 0;
  }

  function countPieces(side) {
    let count = 0;

    forEachPiece(state.board, side, () => {
      count++;
    });

    return count;
  }

  function forEachPiece(board, side, callback) {
    for (let r = 0; r < board.length; r++) {
      for (let c = 0; c < board.length; c++) {
        const piece = board[r][c];
        if (piece && piece.side === side) {
          callback(r, c, piece);
        }
      }
    }
  }

  function isDarkSquare(r, c) {
    return (r + c) % 2 === 1;
  }

  function isAiTurn() {
    return state.mode === "computer" && state.turn === state.aiSide;
  }

  function opponent(side) {
    return side === BLACK ? WHITE : BLACK;
  }

  function sideName(side) {
    return side === BLACK ? "흑" : "백";
  }

  function inBoard(r, c) {
    const size = currentRules().boardSize;
    return r >= 0 && r < size && c >= 0 && c < size;
  }

  function shakeBoard() {
    const board = document.getElementById("board");
    board.classList.remove("shake");
    void board.offsetWidth;
    board.classList.add("shake");
  }

  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
</script>
</body>
